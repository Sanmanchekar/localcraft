services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: localcraft
      MYSQL_DATABASE: localcraft
      MYSQL_USER: localcraft
      MYSQL_PASSWORD: localcraft
    ports:
      - "3306:3306"
    volumes:
      - localcraft_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-plocalcraft"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  localcraft_mysql:
