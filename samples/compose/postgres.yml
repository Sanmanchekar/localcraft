services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: localcraft
      POSTGRES_PASSWORD: localcraft
      POSTGRES_DB: localcraft
    ports:
      - "5432:5432"
    volumes:
      - localcraft_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localcraft"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  localcraft_pg:
